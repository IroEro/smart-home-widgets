name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build 

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Patch capacitor-udp
        run: |
          BUILD_GRADLE="node_modules/capacitor-udp/android/build.gradle"
          if [ -f "$BUILD_GRADLE" ] && ! grep -q "namespace" "$BUILD_GRADLE"; then
            sed -i '/^android {/a\    namespace "com.danielpryor.capacitorudp"' "$BUILD_GRADLE"
            echo "Patched capacitor-udp namespace"
          fi
          MANIFEST="node_modules/capacitor-udp/android/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="[^"]*"//' "$MANIFEST"
            echo "Patched capacitor-udp AndroidManifest.xml package attribute"
          fi

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ewpe-smart-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
