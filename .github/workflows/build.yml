name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --force

      - name: Build web app
        run: npm run build

      - name: Strip remote server URL from Capacitor config
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
            delete cfg.server;
            fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
            console.log('Removed server.url from capacitor.config.json');
          "

      - name: Add Android platform
        run: npx cap add android

      - name: Add Android UDP/network permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # CHANGE_WIFI_MULTICAST_STATE is critical — without it Android silently
          # drops all incoming UDP broadcast/multicast packets (scan responses).
          for PERM in \
            "android.permission.INTERNET" \
            "android.permission.ACCESS_NETWORK_STATE" \
            "android.permission.ACCESS_WIFI_STATE" \
            "android.permission.CHANGE_WIFI_STATE" \
            "android.permission.CHANGE_WIFI_MULTICAST_STATE"; do
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i "s|</manifest>|    <uses-permission android:name=\"$PERM\"/>\n</manifest>|" "$MANIFEST"
              echo "Added $PERM"
            else
              echo "Already present: $PERM"
            fi
          done
          echo "--- Final permissions ---"
          grep "uses-permission" "$MANIFEST"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        
      - name: Patch capacitor-udp
        run: |
          BUILD_GRADLE="node_modules/@frontall/capacitor-udp/android/build.gradle"
          if [ -f "$BUILD_GRADLE" ] && ! grep -q "namespace" "$BUILD_GRADLE"; then
            sed -i '/^android {/a\    namespace "com.danielpryor.capacitorudp"' "$BUILD_GRADLE"
            echo "Patched capacitor-udp namespace"
          fi
          MANIFEST="node_modules/@frontall/capacitor-udp/android/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="[^"]*"//' "$MANIFEST"
            echo "Patched capacitor-udp AndroidManifest.xml package attribute"
          fi
          
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ewpe-smart-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
